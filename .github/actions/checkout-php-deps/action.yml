name: Install PHP dependencies
description: Install PHP dependencies in sources (repository must already be checked out).

inputs:
  sources-path:
    description: Relative path where sources are checked out.
    required: false
    default: sources

runs:
  using: composite
  steps:
    - name: Cache Composer downloads
      uses: actions/cache@v4
      with:
        path: ~/.composer/cache
        key: composer-cache-${{ runner.os }}-${{ hashFiles(format('{0}/composer.lock', inputs.sources-path)) }}
        restore-keys: |
          composer-cache-${{ runner.os }}-

    - name: Install PHP dependencies in sources
      shell: bash
      run: |
        set -euo pipefail
        COMPOSER_CACHE_DIR="${HOME}/.composer/cache"
        docker run --rm --user "$(id -u):$(id -g)" \
          -v "${COMPOSER_CACHE_DIR}":/tmp/composer-cache \
          -v "${{ github.workspace }}/${{ inputs.sources-path }}":/app -w /app \
          -e COMPOSER_CACHE_DIR=/tmp/composer-cache \
          composer install --no-interaction --ignore-platform-reqs --dev
        php "${{ github.workspace }}/${{ inputs.sources-path }}/install-cli.php" --git pull
